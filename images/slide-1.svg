<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Red Gradient -->
    <linearGradient id="leftRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#ff3b3b"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f7f7f7"/>

  <!-- Left Panel -->
  <rect x="0" y="0" width="300" height="400" fill="url(#leftRed)"/>

  <!-- Decorative Circle -->
  <circle cx="150" cy="100" r="80" fill="white" opacity="0.1"/>
  <circle cx="80" cy="300" r="50" fill="white" opacity="0.1"/>

  <!-- Left Text -->
  <text x="150" y="180" font-size="28" font-weight="800" fill="white" text-anchor="middle">
    ကြော်ငြာလုပ်ပါ
  </text>
  <text x="150" y="220" font-size="18" fill="#ffe5e5" text-anchor="middle">
    သင့်လုပ်ငန်းကို မြှင့်တင်ပါ
  </text>

  <!-- Right Content Card -->
  <g filter="url(#softShadow)">
    <rect x="280" y="60" width="470" height="280" rx="20" fill="white"/>
  </g>

  <!-- Title -->
  <text x="515" y="110" font-size="26" font-weight="800" fill="#b00020" text-anchor="middle">
    Grow Your Business
  </text>

  <!-- Email Section -->
  <circle cx="350" cy="160" r="22" fill="#ff3b3b"/>
  <text x="350" y="168" font-size="18" fill="white" text-anchor="middle">✉</text>

  <text x="390" y="155" font-size="14" fill="#777">
    ဆက်သွယ်ရန် Email
  </text>
  <text x="390" y="180" font-size="18" fill="#333" font-weight="700">
    mmtw.cs@gmail.com
  </text>

  <!-- Divider -->
  <line x1="310" y1="200" x2="730" y2="200" stroke="#eee"/>

  <!-- Services -->
  <text x="330" y="230" font-size="14" fill="#444">
    ✓ ကြော်ငြာ Campaign များ
  </text>
  <text x="330" y="255" font-size="14" fill="#444">
    ✓ Brand Partnership
  </text>
  <text x="520" y="230" font-size="14" fill="#444">
    ✓ Promotion အစီအစဉ်များ
  </text>

  <!-- CTA Button -->
  <g filter="url(#softShadow)">
    <rect x="400" y="270" width="220" height="45" rx="25" fill="#ff3b3b"/>
  </g>

  <text x="510" y="298" font-size="15" font-weight="700" fill="white" text-anchor="middle">
    ယနေ့ပဲ ဆက်သွယ်လိုက်ပါ
  </text>

</svg>
