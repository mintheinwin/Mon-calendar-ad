  <text x="180" y="285" font-size="14" fill="white" text-anchor="middle">48-hour delivery</text>
  <text x="180" y="335" font-size="28" fill="white" text-anchor="middle">⚡</text>
  
  <rect x="320" y="230" width="160" height="120" fill="white" opacity="0.2" rx="10"/>
