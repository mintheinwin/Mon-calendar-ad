<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#grad3)"/>
  
  <!-- Decorative shapes -->
  <rect x="0" y="0" width="400" height="400" fill="white" opacity="0.1"/>
  <circle cx="650" cy="100" r="50" fill="white" opacity="0.15"/>
  
  <!-- Main headline -->
  <text x="400" y="80" font-size="56" font-weight="bold" fill="white" text-anchor="middle">SUMMER</text>
