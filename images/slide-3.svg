  <text x="400" y="285" font-size="14" fill="white" text-anchor="middle">Premium materials</text>
  <text x="400" y="335" font-size="28" fill="white" text-anchor="middle">✓</text>
  
  <rect x="540" y="230" width="160" height="120" fill="white" opacity="0.2" rx="10"/>
  <text x="620" y="260" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Support</text>
  <text x="620" y="285" font-size="14" fill="white" text-anchor="middle">24/7 Available</text>
