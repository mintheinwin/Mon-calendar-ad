<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#grad4)"/>
  
  <!-- Limited time banner -->
  <rect x="50" y="40" width="700" height="80" fill="white" opacity="0.95" rx="15"/>
  
  <!-- Timer elements -->
  <text x="400" y="85" font-size="32" font-weight="bold" fill="#fa709a" text-anchor="middle">LIMITED TIME OFFER</text>
  
  <!-- Countdown boxes -->
  <g>
    <!-- Days -->
    <rect x="120" y="140" width="80" height="90" fill="white" opacity="0.9" rx="8"/>
    <text x="160" y="200" font-size="42" font-weight="bold" fill="#fa709a" text-anchor="middle">03</text>
    <text x="160" y="220" font-size="14" fill="#666" text-anchor="middle">DAYS</text>
    
    <!-- Hours -->
    <rect x="240" y="140" width="80" height="90" fill="white" opacity="0.9" rx="8"/>
    <text x="280" y="200" font-size="42" font-weight="bold" fill="#fa709a" text-anchor="middle">18</text>
    <text x="280" y="220" font-size="14" fill="#666" text-anchor="middle">HOURS</text>
    
    <!-- Minutes -->
    <rect x="360" y="140" width="80" height="90" fill="white" opacity="0.9" rx="8"/>
    <text x="400" y="200" font-size="42" font-weight="bold" fill="#fa709a" text-anchor="middle">45</text>
    <text x="400" y="220" font-size="14" fill="#666" text-anchor="middle">MINS</text>
    
    <!-- Seconds -->
    <rect x="480" y="140" width="80" height="90" fill="white" opacity="0.9" rx="8"/>
    <text x="520" y="200" font-size="42" font-weight="bold" fill="#fa709a" text-anchor="middle">23</text>
    <text x="520" y="220" font-size="14" fill="#666" text-anchor="middle">SECS</text>
  </g>
  
  <!-- Main offer text -->
  <text x="400" y="310" font-size="28" font-weight="bold" fill="white" text-anchor="middle">GET 50% OFF + FREE SHIPPING</text>
  
  <!-- CTA Button -->
  <rect x="300" y="330" width="200" height="50" fill="white" rx="25"/>
  <text x="400" y="362" font-size="18" font-weight="bold" fill="#fa709a" text-anchor="middle">GRAB OFFER NOW</text>
  
  <!-- Decorative elements -->
  <text x="650" y="100" font-size="40" fill="white">🎉</text>
  <text x="100" y="320" font-size="40" fill="white">🔥</text>
</svg>
