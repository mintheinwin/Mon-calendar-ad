<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Top Accent -->
  <rect x="0" y="0" width="800" height="5" fill="url(#accent)"/>

  <!-- Main Headline -->
  <text x="70" y="90" font-size="34" font-weight="800" fill="#f8fafc">
    Grow Your Business Faster
  </text>

  <!-- Subheadline -->
  <text x="70" y="125" font-size="16" fill="#94a3b8">
    Smart advertising solutions to reach more customers
  </text>

  <!-- Divider -->
  <line x1="70" y1="145" x2="730" y2="145" stroke="#1e293b"/>

  <!-- Features -->
  <text x="70" y="190" font-size="16" fill="#ef4444">•</text>
  <text x="100" y="190" font-size="14" fill="#e2e8f0">
    Campaign Management
  </text>

  <text x="70" y="220" font-size="16" fill="#ef4444">•</text>
  <text x="100" y="220" font-size="14" fill="#e2e8f0">
    Brand Partnerships
  </text>

  <text x="70" y="250" font-size="16" fill="#ef4444">•</text>
  <text x="100" y="250" font-size="14" fill="#e2e8f0">
    Promotions & Marketing Plans
  </text>

  <!-- Contact Card -->
  <g filter="url(#shadow)">
    <rect x="470" y="170" width="260" height="110" rx="14" fill="#111827" stroke="#374151"/>
  </g>

  <!-- Contact Title -->
  <text x="490" y="205" font-size="14" fill="#9ca3af">
    Contact Us
  </text>

  <!-- Email -->
  <text x="490" y="240" font-size="20" font-weight="800" fill="#ffffff">
    mmtw.cs@gmail.com
  </text>

  <!-- CTA Button -->
  <g filter="url(#shadow)">
    <rect x="70" y="300" width="260" height="50" rx="10" fill="url(#accent)"/>
  </g>

  <text x="200" y="330" font-size="17" font-weight="700" fill="white" text-anchor="middle">
    Start Advertising Today
  </text>

  <!-- Bottom Accent -->
  <rect x="70" y="370" width="100" height="4" fill="#ef4444"/>

</svg>
